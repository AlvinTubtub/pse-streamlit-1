    <!-- Real data injected by Streamlit (app.py) before this script runs.
         __APP_DATA_JSON__ is replaced with real JSON at render time. -->
    <script>
        window.APP_DATA = __APP_DATA_JSON__;
    </script>

    <!-- Application Logic -->
    <script>
        // --- Data Definitions ---
        const SECTORS = {
            FINANCIALS: 'Financials',
            INDUSTRIAL: 'Industrial',
            PROPERTY: 'Property',
            SERVICES: 'Services',
            MINING_OIL: 'Mining and Oil'
        };

        // Real companies + latest close price, sourced from Python (services/data_loader.py)
        const COMPANIES = window.APP_DATA.companies;

        const MODELS = [
            { id: 'lag_reg', name: 'Lag-Informed Regression' },
            { id: 'arima', name: 'ARIMA' },
            { id: 'lstm', name: 'LSTM' }
        ];

        // --- Real Data Accessors (replace old Math.random() mock generators) ---
        // Returns real OHLCV history for a company symbol, computed by Python.
        function generateOHLCV(symbol, days = 100) {
            const company = COMPANIES.find(c => c.symbol === symbol);
            if (!company || !company.ohlcv) return [];
            const slice = company.ohlcv.slice(-days);
            return slice.map(d => ({
                date: new Date(d.date),
                open: d.open, high: d.high, low: d.low, close: d.close, volume: d.volume
            }));
        }

        // Returns real, precomputed model evaluation metrics for a model/company symbol.
        // sector is kept as a parameter for backward compatibility with call sites.
        function getRealMetrics(modelId, symbol) {
            const perCompany = window.APP_DATA.metrics.bySymbol[symbol];
            if (perCompany && perCompany[modelId]) return perCompany[modelId];
            // Fall back to aggregate metrics if a per-company figure isn't available
            return window.APP_DATA.metrics.aggregate[modelId];
        }

        // --- State Management ---
        const state = {
            currentView: 'home',
            selectedCompany: null,
            chartInstances: [],
            radarChartInstance: null,
            compareCharts: { radar: null, errorBar: null, r2Bar: null },
            liveChartInstance: null
        };

        // --- Core Functions ---
        
        // Actually renders a view into #mainContent. Split out from nav() so that
        // page-load initialization can jump straight to a view without re-triggering
        // the Streamlit-page redirect logic in nav() below.
        function renderView(view, params = null) {
            state.currentView = view;

            // Cleanup charts before changing views to prevent memory leaks
            state.chartInstances.forEach(chart => chart.destroy());
            state.chartInstances = [];

            // Update UI Active States
            document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(btn => {
                if(btn.dataset.target === view) {
                    btn.classList.add('text-brand-400', 'bg-white/5');
                    btn.classList.remove('text-slate-400');
                    if(btn.classList.contains('nav-btn')) btn.classList.add('text-white');
                } else {
                    btn.classList.remove('text-brand-400', 'bg-white/5', 'text-white');
                    if(btn.classList.contains('nav-btn')) { /* desktop default */ }
                    else btn.classList.add('text-slate-400');
                }
            });

            const main = document.getElementById('mainContent');
            main.innerHTML = ''; // Clear current content
            window.scrollTo(0, 0);

            // Route to correct render function
            switch(view) {
                case 'home': main.innerHTML = renderHome(); break;
                case 'companies': main.innerHTML = renderCompanyList(); setupCompanyFilters(); break;
                case 'details': main.innerHTML = renderCompanyDetails(params); renderDetailsCharts(params); break;
                case 'compare': main.innerHTML = renderCompare(); renderCompareCharts(); setupCompareFilters(); break;
                case 'live': main.innerHTML = renderLivePrediction(); setupLivePrediction(); break;
                case 'learn': main.innerHTML = renderLearn(); break;
                case 'about': main.innerHTML = renderAbout(); break;
                default: main.innerHTML = renderHome();
            }
        }

        // Navigation Handler (used by nav-btn onclick handlers).
        // The Live Prediction tab needs a *real* Streamlit file_uploader rendered in
        // the main page (above this iframe), because only Python can validate the CSV
        // and run the trained models. Streamlit has no visibility into which tab this
        // embedded dashboard is showing, so entering/leaving the 'live' tab syncs a
        // ?page=live URL param on the top-level Streamlit page (one real navigation),
        // and app.py reads that param to decide whether to show the uploader there.
        // Switches between all other tabs stay instant/client-side, no reload.
        function nav(view, params = null) {
            const enteringLive = view === 'live' && state.currentView !== 'live';
            const leavingLive = view !== 'live' && state.currentView === 'live';

            if (enteringLive || leavingLive) {
                const url = new URL(window.top.location.href);
                if (view === 'live') {
                    url.searchParams.set('page', 'live');
                } else {
                    url.searchParams.delete('page');
                }
                window.top.location.href = url.toString();
                return;
            }

            renderView(view, params);
        }

        // Global Search Setup
        const searchInput = document.getElementById('globalSearch');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length < 1) {
                searchResults.classList.add('hidden');
                return;
            }

            const matches = COMPANIES.filter(c => 
                c.symbol.toLowerCase().includes(query) || 
                c.name.toLowerCase().includes(query)
            );

            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(c => `
                    <div class="px-4 py-2 hover:bg-white/5 cursor-pointer flex justify-between items-center border-b border-dark-border last:border-0" onclick="nav('details', '${c.symbol}'); document.getElementById('searchResults').classList.add('hidden'); document.getElementById('globalSearch').value=''">
                        <div>
                            <span class="font-bold text-white">${c.symbol}</span>
                            <span class="text-sm text-slate-400 block">${c.name}</span>
                        </div>
                        <span class="text-xs bg-dark-bg px-2 py-1 rounded text-slate-300">${c.sector}</span>
                    </div>
                `).join('');
                searchResults.classList.remove('hidden');
            } else {
                searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-slate-500">No companies found.</div>';
                searchResults.classList.remove('hidden');
            }
        });
        
        // Hide search results on click outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });

        // --- STREAMING_CHUNK:Rendering Home Dashboard ---
        function renderHome() {
            return `

                    <!-- Hero Section -->
                    <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-brand-900 to-dark-bg border border-dark-border p-8 md:p-12 shadow-2xl">
                        <div class="absolute top-0 right-0 -mt-10 -mr-10 text-brand-500/10 hidden md:block">
                            <i class="ph-fill ph-chart-line-up text-[20rem]"></i>
                        </div>
                        <div class="relative z-10 max-w-3xl">
                            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-500/20 text-brand-300 text-sm font-medium mb-6 border border-brand-500/30">
                                <i class="ph-fill ph-graduation-cap"></i> Educational Dashboard
                            </div>
                            <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight mb-4">
                                Cross-Sector Next-Day <br class="hidden md:block"/>Stock Price Forecasting

                            <p class="text-lg text-slate-300 mb-8 leading-relaxed max-w-2xl">
                                Explore historical Philippine stock market data, compare machine learning and statistical models, and understand next-day price prediction techniques.
                            </p>
                            <div class="flex flex-wrap gap-4">

                                    Explore Forecasts <i class="ph ph-arrow-right"></i>
                                </button>
                                <button onclick="nav('live')" class="px-6 py-3 bg-dark-card border border-dark-border hover:bg-white/5 text-white rounded-xl font-medium transition-colors flex items-center gap-2">
                                    <i class="ph ph-upload-simple text-brand-400"></i> Upload & Predict
                                </button>
                                <button onclick="nav('learn')" class="px-6 py-3 text-slate-300 hover:text-white transition-colors flex items-center gap-2 underline underline-offset-4">
                                    Learn About Forecasting
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-dark-card border border-dark-border p-6 rounded-2xl shadow-sm flex items-start gap-4">
                            <div class="p-3 bg-blue-500/10 rounded-xl text-blue-400">
                                <i class="ph-fill ph-buildings text-2xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-slate-400 font-medium">Total Companies</p>
                                <p class="text-2xl font-bold text-white">15</p>
                                <p class="text-xs text-slate-500 mt-1">Across 5 PSE Sectors</p>
                            </div>
                        </div>
                        <div class="bg-dark-card border border-dark-border p-6 rounded-2xl shadow-sm flex items-start gap-4">
                            <div class="p-3 bg-purple-500/10 rounded-xl text-purple-400">
                                <i class="ph-fill ph-brain text-2xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-slate-400 font-medium">Forecasting Models</p>
                                <p class="text-2xl font-bold text-white">3</p>
                                <p class="text-xs text-slate-500 mt-1">Lag-Informed Regression, ARIMA, LSTM</p>
                            </div>
                        </div>
                        <div class="bg-dark-card border border-dark-border p-6 rounded-2xl shadow-sm flex items-start gap-4">
                            <div class="p-3 bg-green-500/10 rounded-xl text-green-400">
                                <i class="ph-fill ph-calendar-check text-2xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-slate-400 font-medium">Prediction Horizon</p>
                                <p class="text-xl font-bold text-white mt-1">Next Trading Day</p>
                                <p class="text-xs text-slate-500 mt-1">t+1 Forecasting</p>
                            </div>
                        </div>
                        <div class="bg-dark-card border border-dark-border p-6 rounded-2xl shadow-sm flex items-start gap-4">
                            <div class="p-3 bg-orange-500/10 rounded-xl text-orange-400">
                                <i class="ph-fill ph-database text-2xl"></i>
                            </div>
                            <div>
                                <p class="text-sm text-slate-400 font-medium">Data Source</p>
                                <p class="text-sm font-bold text-white mt-1">PSE EDGE</p>
                                <p class="text-xs text-brand-400 mt-1">Synthesized for demo</p>
                            </div>
                        </div>
                    </div>

                    <!-- Sector Overview (Visual interest) -->
                    <div>
                        <h2 class="text-xl font-bold text-white mb-4">Sectors Covered</h2>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                            ${Object.values(SECTORS).map(sector => `
                                <div class="bg-dark-card border border-dark-border rounded-xl p-4 text-center hover:border-brand-500/50 transition-colors cursor-pointer" onclick="nav('companies'); setTimeout(()=>document.getElementById('sectorFilter').value='${sector}', 50)">
                                    <span class="text-sm font-medium text-slate-300 block">${sector}</span>
                                    <span class="text-xs text-slate-500 mt-1">3 Companies</span>

                            `).join('')}
                        </div>

                </div>
            `;
        }

        // --- STREAMING_CHUNK:Rendering Company List ---
        function renderCompanyList() {
            return `
                <div class="animate-[fadeIn_0.3s_ease-out]">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-white tracking-tight">Included Companies</h1>
                            <p class="text-slate-400 mt-1">Select a company to view historical data and forecast results.</p>
                        </div>
                        <div class="flex w-full md:w-auto gap-2">
                            <select id="sectorFilter" class="bg-dark-card border border-dark-border text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block w-full p-2.5 text-white">
                                <option value="all">All Sectors</option>
                                ${Object.values(SECTORS).map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="companyGrid">
                        ${COMPANIES.map(company => `
                            <div class="company-card group bg-dark-card border border-dark-border rounded-2xl p-6 hover:border-brand-500/50 hover:shadow-lg hover:shadow-brand-500/10 transition-all cursor-pointer relative overflow-hidden" data-sector="${company.sector}" onclick="nav('details', '${company.symbol}')">
                                <div class="absolute top-0 right-0 w-24 h-24 bg-brand-500/5 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-110"></div>
                                <div class="flex justify-between items-start mb-4 relative z-10">
                                    <div>
                                        <h3 class="text-2xl font-bold text-white">${company.symbol}</h3>
                                        <span class="text-xs font-medium px-2.5 py-0.5 rounded bg-white/5 text-slate-300 border border-white/10 mt-2 inline-block">${company.sector}</span>
                                    </div>
                                    <div class="bg-dark-bg p-2 rounded-lg border border-dark-border">
                                        <i class="ph-fill ph-chart-line-up text-brand-400 text-xl"></i>
                                    </div>
                                </div>
                                <p class="text-slate-400 text-sm font-medium mb-6 relative z-10">${company.name}</p>
                                <div class="flex justify-between items-center mt-auto pt-4 border-t border-dark-border relative z-10">
                                    <span class="text-xs text-slate-500"><i class="ph ph-clock mr-1"></i>Mock Data Ready</span>
                                    <span class="text-brand-400 text-sm font-medium flex items-center group-hover:translate-x-1 transition-transform">View Details <i class="ph ph-caret-right ml-1"></i></span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function setupCompanyFilters() {
            const filter = document.getElementById('sectorFilter');
            const cards = document.querySelectorAll('.company-card');
            
            filter.addEventListener('change', (e) => {
                const selected = e.target.value;
                cards.forEach(card => {
                    if (selected === 'all' || card.dataset.sector === selected) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }

        // --- STREAMING_CHUNK:Rendering Company Details & Charts ---
        function renderCompanyDetails(symbol) {
            const company = COMPANIES.find(c => c.symbol === symbol);
            if(!company) return `<div class="text-center py-20 text-red-400">Company not found.</div>`;

            // Real latest close + real next-day prediction, computed in Python
            const pred = window.APP_DATA.predictions[symbol] || {};
            const mockLatestPrice = (company.latestClose ?? company.basePrice).toFixed(2);
            const mockPredPrice = (pred.nextClose ?? company.latestClose ?? company.basePrice).toFixed(2);
            const direction = mockPredPrice > mockLatestPrice ? 'Up' : 'Down';
            const dirColor = direction === 'Up' ? 'text-green-400' : 'text-red-400';
            const dirIcon = direction === 'Up' ? 'ph-trend-up' : 'ph-trend-down';

            return `
                <div class="animate-[fadeIn_0.3s_ease-out]">
                    <!-- Back & Header -->
                    <button onclick="nav('companies')" class="text-slate-400 hover:text-white text-sm flex items-center gap-1 mb-6 transition-colors">
                        <i class="ph ph-arrow-left"></i> Back to Companies

        function setupCompareFilters() {
            const filter = document.getElementById('companyCompareFilter');
            filter.addEventListener('change', (e) => {
                const symbol = e.target.value;
                updateCompareData(symbol);
            });
        }

        function updateCompareData(symbol) {
            let lagMetrics, arimaMetrics, lstmMetrics, naiveMetrics;
            let companyInfoHtml = '';

            if (symbol === 'all') {
                const agg = window.APP_DATA.metrics.aggregate;
                lagMetrics = agg.lag_reg;
                arimaMetrics = agg.arima;
                lstmMetrics = agg.lstm;
                naiveMetrics = agg.naive;
                
                companyInfoHtml = `
                    <span class="font-semibold text-brand-400">Aggregate Data</span>
                    <span class="text-slate-500">|</span> 
                    <span>All ${COMPANIES.length} Companies Across Sectors</span>
                `;
            } else {
                const company = COMPANIES.find(c => c.symbol === symbol);
                const m1 = getRealMetrics('lag_reg', symbol);
                const m2 = getRealMetrics('arima', symbol);
                const m3 = getRealMetrics('lstm', symbol);
                const m4 = getRealMetrics('naive', symbol);
                
                lagMetrics = m1; arimaMetrics = m2; lstmMetrics = m3; naiveMetrics = m4;
                
                companyInfoHtml = `
                    <span class="font-bold text-white px-2 py-0.5 bg-dark-bg rounded border border-dark-border">${company.symbol}</span>
                    <span class="text-slate-300">${company.name}</span>
                    <span class="text-slate-500">|</span> 
                    <span class="text-brand-400 font-medium text-xs uppercase tracking-wider">${company.sector}</span>
                `;
            }

            document.getElementById('compareCompanyInfo').innerHTML = companyInfoHtml;

            const models = [
                { id: 'Lag-Informed Regression', m: lagMetrics },
                { id: 'ARIMA', m: arimaMetrics },
                { id: 'LSTM', m: lstmMetrics }
            ];
            
            const bestRmse = models.reduce((min, p) => parseFloat(p.m.rmse) < parseFloat(min.m.rmse) ? p : min, models[0]);
            const bestMae = models.reduce((min, p) => parseFloat(p.m.mae) < parseFloat(min.m.mae) ? p : min, models[0]);
            const bestMape = models.reduce((min, p) => parseFloat(p.m.mape) < parseFloat(min.m.mape) ? p : min, models[0]);
            const bestR2 = models.reduce((max, p) => parseFloat(p.m.r2) > parseFloat(max.m.r2) ? p : max, models[0]);

            // Update Summary Cards
            document.getElementById('bestRmseVal').innerText = bestRmse.m.rmse;
            document.getElementById('bestRmseModel').innerText = bestRmse.id;
            
            document.getElementById('bestMaeVal').innerText = bestMae.m.mae;
            
            document.getElementById('bestMapeVal').innerText = bestMape.m.mape + '%';
            
            document.getElementById('bestR2Val').innerText = bestR2.m.r2;
            document.getElementById('bestR2Model').innerText = "Naive baseline R² = " + naiveMetrics.r2;
            
            document.getElementById('overallBestDesc').innerText = `${bestRmse.id} demonstrated the strongest ability to capture complex market patterns for this selection, achieving the lowest overall prediction errors.`;

            // Calculate Rankings (1 = Best, based on RMSE)
            const competingModels = [...models];
            const naiveModel = { id: 'Naive baseline', m: naiveMetrics };

            const rankedModels = [...competingModels].sort((a, b) => parseFloat(a.m.rmse) - parseFloat(b.m.rmse));
            competingModels.forEach(model => {
                model.rank = rankedModels.findIndex(m => m.id === model.id) + 1;
                model.beatsNaive = parseFloat(model.m.rmse) < parseFloat(naiveModel.m.rmse);
            });

            // Sort models to display Best first
            competingModels.sort((a, b) => a.rank - b.rank);

            // Update Table
            const renderRow = (modelObj, isNaive = false) => {
                if (isNaive) {
                    return `
                        <tr class="border-b border-dark-border/50 bg-dark-bg/30 text-slate-400 italic hover:bg-white/5 transition-colors">
                            <td class="px-6 py-4 font-bold text-sm text-slate-400">${modelObj.id}</td>
                            <td class="px-6 py-4">${modelObj.m.rmse}</td>
                            <td class="px-6 py-4">${modelObj.m.mae}</td>
                            <td class="px-6 py-4">${modelObj.m.mape}%</td>
                            <td class="px-6 py-4">${modelObj.m.r2}</td>

        function renderLiveChart(historical, preds, selectedModel) {
            if (state.liveChartInstance) {
                state.liveChartInstance.destroy();
            }

            const lastPoint = historical[historical.length - 1];
            const nextDate = lastPoint.x + 86400000; // +1 day

            const series = [{ name: 'Actual close', data: historical }];
            const colors = ['#ffffff']; // White line for actual in dark mode
            const dashArrays = [0]; // Solid line
            const markerSizes = [4];

            // Always add naive baseline
            series.push({
                name: 'Naive (no skill)',
                data: [{x: lastPoint.x, y: lastPoint.y}, {x: nextDate, y: lastPoint.y}]
            });
            colors.push('#9ca3af'); // Gray
            dashArrays.push(5);
            markerSizes.push(8);

            if (selectedModel === 'all' || selectedModel === 'lag') {
                series.push({
                    name: 'Lag-Informed Regression ⚠',
                    data: [{x: lastPoint.x, y: lastPoint.y}, {x: nextDate, y: preds.lag}]
                });
                colors.push('#3b82f6'); // Blue
                dashArrays.push(5);
                markerSizes.push(8);
            }
            
            if (selectedModel === 'all' || selectedModel === 'arima') {
                series.push({
                    name: 'ARIMA ⚠',
                    data: [{x: lastPoint.x, y: lastPoint.y}, {x: nextDate, y: preds.arima}]
                });
                colors.push('#8b5cf6'); // Purple
                dashArrays.push(5);
                markerSizes.push(8);
            }
            
            if (selectedModel === 'all' || selectedModel === 'lstm') {
                series.push({
                    name: 'LSTM ✓',
                    data: [{x: lastPoint.x, y: lastPoint.y}, {x: nextDate, y: preds.lstm}]
                });
                colors.push('#f97316'); // Orange
                dashArrays.push(5);
                markerSizes.push(8);
            }

            const options = {
                series: series,
                chart: {
                    height: 350,
                    type: 'line',
                    background: 'transparent',
                    toolbar: { show: false },
                    animations: { enabled: true, easing: 'easeinout', speed: 800 }
                },
                theme: { mode: 'dark' },
                colors: colors,
                stroke: {
                    curve: 'straight',
                    width: [2, 2, 2, 2, 2],
                    dashArray: dashArrays
                },
                markers: {
                    size: markerSizes,
                    strokeWidth: 0,
                    hover: { sizeOffset: 2 }
                },
                title: {
                    text: '',
                    align: 'center',
                    style: { color: '#ef4444', fontSize: '10px', fontWeight: 'bold', cssClass: 'apexcharts-subtitle-text', opacity: 0.2 }
                },
                xaxis: {
                    type: 'datetime',
                    labels: { style: { colors: '#94a3b8' } },
                    axisBorder: { color: '#334155' }
                },
                yaxis: {
                    labels: {
                        style: { colors: '#94a3b8' },
                        formatter: (value) => value.toFixed(0)
                    }
                },
                grid: { borderColor: '#1e293b', strokeDashArray: 4 },
                legend: { position: 'top', horizontalAlign: 'center', labels: { colors: '#cbd5e1' }, itemMargin: { horizontal: 10, vertical: 5 } }
            };

            state.liveChartInstance = new ApexCharts(document.querySelector("#livePredictionChart"), options);
            state.liveChartInstance.render();
            state.chartInstances.push(state.liveChartInstance);
        }

                                    <div class="bg-dark-bg p-4 rounded-xl border border-dark-border text-center">
                                        <div class="text-red-400 font-bold text-xl mb-1">L</div>
                                        <div class="text-white text-sm font-semibold">Low</div>
                                        <div class="text-xs text-slate-500 mt-1">Lowest price of the day.</div>
                                    </div>
                                    <div class="bg-brand-900/40 p-4 rounded-xl border border-brand-500/50 text-center shadow-[0_0_15px_rgba(59,130,246,0.1)] relative">
                                        <div class="absolute -top-2 -right-2 bg-brand-500 text-[9px] font-bold text-white px-2 py-0.5 rounded">TARGET</div>
                                        <div class="text-brand-300 font-bold text-xl mb-1">C</div>
                                        <div class="text-white text-sm font-semibold">Close</div>
                                        <div class="text-xs text-slate-400 mt-1">Final price. What we predict.</div>
                                    </div>
                                    <div class="bg-dark-bg p-4 rounded-xl border border-dark-border text-center">
                                        <div class="text-purple-400 font-bold text-xl mb-1">V</div>
                                        <div class="text-white text-sm font-semibold">Volume</div>
                                        <div class="text-xs text-slate-500 mt-1">Total shares traded.</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Models Section -->
                        <h2 class="text-2xl font-bold text-white text-center mt-12 mb-6">The Forecasting Models</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            <!-- Model 1 -->
                            <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:-translate-y-1 transition-transform">
                                <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center text-slate-300 mb-4 border border-slate-700">
                                    <i class="ph-bold ph-calculator text-2xl"></i>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1">Lag Regression</h3>
                                <p class="text-sm font-medium text-slate-400 mb-4">"The Pattern Spotter"</p>
                                <p class="text-sm text-slate-300 leading-relaxed">
                                    An interpretable machine learning model. It studies recent historical prices and trading volumes, uses PACF to identify meaningful lag relationships (patterns repeating over days), and LASSO regularization to retain only the strongest predictors.
                                </p>
                            </div>

                            <!-- Model 2 -->
                            <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:-translate-y-1 transition-transform">
                                <div class="w-12 h-12 bg-blue-900/30 rounded-xl flex items-center justify-center text-blue-400 mb-4 border border-blue-900">
                                    <i class="ph-bold ph-chart-line-up text-2xl"></i>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1">ARIMA</h3>
                                <p class="text-sm font-medium text-blue-400 mb-4">"The Trend Tracker"</p>
                                <p class="text-sm text-slate-300 leading-relaxed">
                                    A traditional statistical time-series standard. It analyzes historical closing prices, underlying trends, differencing (to stabilize data), and past forecasting errors to mathematically estimate the next day's closing price.
                                </p>
                            </div>

                            <!-- Model 3 -->
                            <div class="bg-dark-card border border-brand-500/50 rounded-2xl p-6 hover:-translate-y-1 transition-transform shadow-[0_0_20px_rgba(59,130,246,0.1)] relative overflow-hidden">
                                <div class="absolute top-0 right-0 bg-brand-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl">DEEP LEARNING</div>
                                <div class="w-12 h-12 bg-brand-900/50 rounded-xl flex items-center justify-center text-brand-300 mb-4 border border-brand-500/50">
                                    <i class="ph-bold ph-brain text-2xl"></i>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1">LSTM</h3>
                                <p class="text-sm font-medium text-brand-400 mb-4">"The Deep Thinker"</p>
                                <p class="text-sm text-slate-300 leading-relaxed">
                                    A deep learning recurrent neural network. Long Short-Term Memory (LSTM) studies sequences of historical prices. It explicitly learns to "remember" important long-term patterns and "forget" irrelevant noise to generate forecasts.
                                </p>
                            </div>
                        </div>

                        <!-- Metrics Section -->
                        <div class="pt-8">
                            <h2 class="text-2xl font-bold text-white text-center mb-4">The Metrics: How Do We Know if a Model is Good?</h2>
                            <p class="text-slate-400 text-center max-w-3xl mx-auto mb-8 text-sm leading-relaxed">
                                When you look at the Model Performance page, you will see a few different scores. We use these to grade the models by comparing what the model predicted against what the stock's price actually was on that day.
                            </p>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- RMSE -->
                                <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:border-blue-500/50 transition-colors">
                                    <h3 class="text-lg font-bold text-blue-400 mb-1">RMSE (Root Mean Squared Error)</h3>
                                    <p class="text-sm font-medium text-white mb-3">Our Main Grading Score</p>
                                    <p class="text-sm text-slate-400 leading-relaxed mb-4">Think of this as the average prediction error in raw Pesos, but it heavily penalizes huge misses. If a model gets most days right but is completely wrong on one day, its RMSE will look bad.</p>
                                    <div class="inline-block px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded text-xs font-bold uppercase tracking-wider">Lower is better</div>
                                </div>

                                <!-- MAE -->
                                <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:border-green-500/50 transition-colors">
                                    <h3 class="text-lg font-bold text-green-400 mb-1">MAE (Mean Absolute Error)</h3>
                                    <p class="text-sm font-medium text-white mb-3">The Average Miss</p>
                                    <p class="text-sm text-slate-400 leading-relaxed mb-4">This is simply the average difference between the predicted price and the actual price in Pesos. If the MAE is ₱2.00, it means the model's forecasts were off by an average of 2 Pesos.</p>
                                    <div class="inline-block px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded text-xs font-bold uppercase tracking-wider">Lower is better</div>
                                </div>

                                <!-- MAPE -->
                                <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:border-yellow-500/50 transition-colors">
                                    <h3 class="text-lg font-bold text-yellow-400 mb-1">MAPE (Mean Absolute Percentage Error)</h3>
                                    <p class="text-sm font-medium text-white mb-3">The Percentage Miss</p>
                                    <p class="text-sm text-slate-400 leading-relaxed mb-4">This tells us how far off the prediction was as a percentage. If a stock costs ₱1,000 and the model is off by ₱10, that’s a 1% error. This metric is perfect for comparing different stocks against each other, regardless of how expensive their shares are.</p>
                                    <div class="inline-block px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded text-xs font-bold uppercase tracking-wider">Lower is better</div>
                                </div>

                                <!-- R2 -->
                                <div class="bg-dark-card border border-dark-border rounded-2xl p-6 hover:border-purple-500/50 transition-colors">
                                    <h3 class="text-lg font-bold text-purple-400 mb-1">R² (R-squared)</h3>
                                    <p class="text-sm font-medium text-white mb-3">The Explanation Score</p>
                                    <p class="text-sm text-slate-400 leading-relaxed mb-4">This tells us what percentage of the stock's actual movement the model successfully captured. Higher is better (a score closer to 1.0 or 100% means the model fits the data very well).</p>
                                    <div class="inline-block px-3 py-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded text-xs font-bold uppercase tracking-wider">Higher is better</div>
                                </div>
                            </div>
                        </div>

                        <!-- Warning -->
                        <div class="mt-12 bg-red-950/30 border border-red-900/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center sm:items-start gap-4">
                            <i class="ph-fill ph-warning-octagon text-red-500 text-4xl mt-1 shrink-0"></i>
                            <div>
                                <h3 class="text-lg font-bold text-red-400 mb-2">Forecasts Are Not Financial Advice</h3>
                                <p class="text-sm text-slate-300 leading-relaxed">
                                    These models look only at numerical history. Real stock prices are violently affected by breaking news, economic reports (inflation, interest rates), corporate earnings surprises, natural disasters, and irrational human sentiment—none of which are captured by OHLCV data alone. Use this tool to learn about data analytics, not to risk real money.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
